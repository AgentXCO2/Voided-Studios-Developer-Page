<!DOCTYPE html>
<html>
<head>
  <title>Void Studios</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<!-- 🟣 GITHUB STYLE REPO NAV -->
<div id="repoNav">
  <div class="navItem active" onclick="setView('code', event)">Code</div>
  <div class="navItem" onclick="setView('issues', event)">Issues</div>
  <div class="navItem" onclick="setView('pulls', event)">Pull requests</div>
  <div class="navItem" onclick="setView('actions', event)">Actions</div>
  <div class="navItem" onclick="setView('projects', event)">Projects</div>
  <div class="navItem" onclick="setView('wiki', event)">Wiki</div>
  <div class="navItem" onclick="setView('security', event)">Security</div>
  <div class="navItem" onclick="setView('insights', event)">Insights</div>
  <div class="navItem" onclick="setView('settings', event)">Settings</div>
</div>

<div id="layout">

  <div id="sidebar">
    <h2>🟣 VOID STUDIOS</h2>

    <button onclick="loadOrgs()">Orgs</button>
    <button onclick="loadRepos()">Repos</button>
    <button onclick="createFile()">New File</button>

    <div id="orgList"></div>
    <div id="repoList"></div>
  </div>

  <div id="files">
    <h3 id="repoTitle">Repo</h3>
    <div id="tree"></div>
  </div>

  <div id="editorPanel">

    <!-- TABS -->
    <div id="tabsBar"></div>

    <!-- ACTION BAR -->
    <div id="bar">
      <span id="fileName">No file</span>

      <button onclick="renameFileInline()">Rename</button>
      <button onclick="deleteFile()">Delete</button>
      <button onclick="saveFile()">Commit</button>
    </div>

    <input id="commitMsg" placeholder="Commit message..." />
    <textarea id="editor"></textarea>

  </div>

</div>

<script src="app.js"></script>
</body>
</html>
